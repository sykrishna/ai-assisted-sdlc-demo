version: '3.9'
services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://api:3001
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3001:3001'
    environment:
      - API_PORT=3001
      - API_PREFIX=api
      - JWT_ISSUER=ai-assisted-sdlc-demo
      - JWT_AUDIENCE=web-client
      - JWT_ACCESS_TOKEN_TTL_SECONDS=900
      - JWT_REFRESH_TOKEN_TTL_SECONDS=1209600
